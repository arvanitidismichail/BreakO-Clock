<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreakO-Clock</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #08080f; -webkit-tap-highlight-color: transparent;">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useCallback } = React;

    // ─── LOCAL STORAGE HOOK ───
    function useStickyState(defaultValue, key) {
      const [value, setValue] = useState(() => {
        const stickyValue = window.localStorage.getItem(key);
        return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
      });
      useEffect(() => {
        window.localStorage.setItem(key, JSON.stringify(value));
      }, [key, value]);
      return [value, setValue];
    }

    // ─── EXERCISE LIBRARY ───
    const EXERCISES = [
      { 
        id: "chin-tuck", 
        name: "Οπίσθια Προβολή Αυχένα (Chin tuck)", 
        duration: 30, 
        reps: "5-10 επαν.", 
        bodyArea: "neck", 
        instruction: "Τραβήξτε αργά το κεφάλι σας προς τα πίσω και ελαφρώς προς τα κάτω. Θα νιώσετε ήπια ένταση στον αυχένα.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά.", 
        image: "./opisthia-provoli-auxena-chin-tuck.png" 
      },
      { 
        id: "neck-ext", 
        name: "Έκταση Αυχένα", 
        duration: 30, 
        reps: "5-10 επαν.", 
        bodyArea: "neck", 
        instruction: "Κλίνετε αργά το κεφάλι προς τα πίσω μέχρι να νιώσετε πίεση στο πίσω μέρος του αυχένα. Σταματήστε αμέσως αν νιώσετε ζάλη.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά.", 
        image: "./askisi-ektasi-auxena.png" 
      },
      { 
        id: "neck-side", 
        name: "Πλάγια κάμψη Αυχένα", 
        duration: 40, 
        reps: "5-10 επαν.", 
        bodyArea: "neck", 
        instruction: "Κρατώντας τη μύτη σας στραμμένη μπροστά, φέρτε αργά το αριστερό σας αυτί προς τον αριστερό ώμο. Επαναλάβετε προς τα δεξιά.", 
        evidence: "Και στις δύο πλευρές. Εκτελέστε 5 φορές καθημερινά.", 
        image: "./plagia-kampsi-auxena.png" 
      },
      { 
        id: "shoulder-circles", 
        name: "Κυκλικές Κινήσεις Ώμων", 
        duration: 30, 
        reps: "10-15 επαν.", 
        bodyArea: "shoulders", 
        instruction: "Κάντε αργούς, μεγάλους κύκλους με τους ώμους. Κάθε φορά που οι ώμοι πάνε προς τα πίσω και κάτω, πλησιάστε τις ωμοπλάτες μεταξύ τους. Τα χέρια μένουν χαλαρά.", 
        evidence: "Χαλαρώνει την ένταση της ωμικής ζώνης.", 
        image: "./kiklikes-kiniseis-wmwn.png" 
      },
      { 
        id: "scapula-stretch", 
        name: "Διάταση Ανελκτήρα", 
        duration: 60, 
        reps: "2-3 επαν. x 30s", 
        bodyArea: "neck", 
        instruction: "Πιάστε την άκρη της καρέκλας. Γυρίστε το κεφάλι διαγώνια, σαν να κοιτάτε τη μασχάλη της άλλης πλευράς. Πιέστε απαλά το κεφάλι με το ελεύθερο χέρι.", 
        evidence: "Κρατήστε την διάταση για 30-60 δευτερόλεπτα κάθε φορά.", 
        image: "./diatasi-aneltira-wmoplatis.png" 
      }
    ];

    const AREA_LABELS = { all: "Όλες", neck: "Αυχένας", shoulders: "Ώμοι" };

    // ─── TIMER RING ───
    function TimerRing({ progress, timeLeft, totalTime, isRunning, color, size = 200 }) {
      const radius = (size - 16) / 2;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - progress);
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      return (
        <div style={{ position: "relative", width: size, height: size }}>
          <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#141420" strokeWidth="6" />
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset} style={{ transition: "stroke-dashoffset 1s linear", filter: `drop-shadow(0 0 8px ${color}40)` }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: size > 150 ? 42 : 28, fontWeight: 800, color: "#f1f5f9", fontFamily: "monospace", letterSpacing: -2 }}>
              {minutes}:{seconds.toString().padStart(2, "0")}
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ───
    function BreakFlow() {
      const [screen, setScreen] = useState("home"); 
      const [workMinutes, setWorkMinutes] = useState(30);
      const [timeLeft, setTimeLeft] = useState(30 * 60);
      const [isRunning, setIsRunning] = useState(false);
      const [currentExercise, setCurrentExercise] = useState(null);
      const [exerciseTimeLeft, setExerciseTimeLeft] = useState(0);
      const [exerciseRunning, setExerciseRunning] = useState(false);
      const [activeFilter, setActiveFilter] = useState("all");

      const todayDateString = new Date().toDateString();
      const [savedDate, setSavedDate] = useStickyState(todayDateString, "bf-neck-date");
      const [completedToday, setCompletedToday] = useStickyState([], "bf-neck-completed");
      const [totalBreaksToday, setTotalBreaksToday] = useStickyState(0, "bf-neck-breaks");

      useEffect(() => {
        if (savedDate !== todayDateString) {
          setCompletedToday([]); setTotalBreaksToday(0); setSavedDate(todayDateString);
        }
      }, [todayDateString, savedDate]);

      // Upgraded Double-Chime Sound!
      const playChime = useCallback(() => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.connect(gain); 
          gain.connect(ctx.destination);
          
          osc.type = "sine"; 
          
          // Double note chime
          osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5 note
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.2); // E5 note
          
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
          
          osc.start(ctx.currentTime); 
          osc.stop(ctx.currentTime + 1.5);
        } catch (e) {
            console.log("Audio not supported or blocked");
        }
      }, []);

      useEffect(() => {
        if (!isRunning || screen !== "working") return;
        if (timeLeft <= 0) {
          playChime(); setScreen("break"); setIsRunning(false); setCurrentExercise(null);
          return;
        }
        const t = setTimeout(() => setTimeLeft(tl => tl - 1), 1000);
        return () => clearTimeout(t);
      }, [isRunning, timeLeft, screen]);

      useEffect(() => {
        if (!exerciseRunning || exerciseTimeLeft <= 0) {
          if (exerciseRunning && exerciseTimeLeft <= 0 && currentExercise) {
            if (!completedToday.includes(currentExercise.id)) setCompletedToday(prev => [...prev, currentExercise.id]);
            setExerciseRunning(false); playChime();
          }
          return;
        }
        const t = setTimeout(() => setExerciseTimeLeft(tl => tl - 1), 1000);
        return () => clearTimeout(t);
      }, [exerciseRunning, exerciseTimeLeft, currentExercise]);

      const startWork = () => { setTimeLeft(workMinutes * 60); setIsRunning(true); setScreen("working"); };
      const startExercise = (ex) => { setCurrentExercise(ex); setExerciseTimeLeft(ex.duration); setExerciseRunning(true); };
      const finishBreak = () => { setTotalBreaksToday(b => b + 1); setCurrentExercise(null); setExerciseRunning(false); startWork(); };

      const displayedExercises = activeFilter === "all" ? EXERCISES : EXERCISES.filter(ex => ex.bodyArea === activeFilter);
      const accent = "#3b82f6";
      const accentDark = "#1d4ed8";

      const isCustomTime = ![20, 30, 45, 60].includes(workMinutes);

      return (
        <div style={{ minHeight: "100vh", color: "#c9d1d9", fontFamily: "sans-serif", maxWidth: 480, margin: "0 auto", paddingBottom: "80px", position: "relative" }}>
          <style>{` 
            button{font-family:inherit;} 
            input[type=number]::-webkit-inner-spin-button, 
            input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
          `}</style>

          {/* HOME SCREEN */}
          {screen === "home" && (
            <div style={{ padding: "40px 24px" }}>
              <div style={{ textAlign: "center", marginBottom: 40 }}>
                {/* YOUR LOGO */}
                <img src="./logo-WP-Social-OnlyIcon.jpg" alt="Workplace Physiocare Logo" style={{ width: 80, height: 80, borderRadius: 20, margin: "0 auto 16px", display: "block", boxShadow: `0 8px 32px ${accent}40`, objectFit: "cover" }} />
                
                <h1 style={{ fontSize: 28, fontWeight: 800, color: "#f1f5f9", margin: "0 0 4px" }}>BreakO-Clock</h1>
                <p style={{ fontSize: 12, color: "#6b7280", margin: 0 }}>Workplace Physiocare</p>
              </div>

              {/* TIMER SELECTOR (WITH MANUAL INPUT) */}
              <div style={{ marginBottom: 28 }}>
                <div style={{ fontSize: 10, color: "#4b5563", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 10, textAlign: "center" }}>Χρόνος εργασίας (λεπτά)</div>
                <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", alignItems: "center" }}>
                  {[20, 30, 45, 60].map(min => (
                    <button key={min} onClick={() => setWorkMinutes(min)} style={{
                      width: 52, height: 52, borderRadius: 14, border: `2px solid ${workMinutes === min ? accent : "#1a1a28"}`,
                      backgroundColor: workMinutes === min ? `${accent}15` : "#0c0c18",
                      color: workMinutes === min ? accent : "#6b7280",
                      fontSize: 16, fontWeight: 800, cursor: "pointer", transition: "all 0.2s"
                    }}>{min}</button>
                  ))}
                  
                  {/* MANUAL TIMER INPUT */}
                  <input 
                    type="number" 
                    placeholder="Άλλο"
                    onChange={(e) => {
                      const val = parseInt(e.target.value);
                      if(val > 0) setWorkMinutes(val);
                    }}
                    style={{
                      width: 60, height: 52, borderRadius: 14, 
                      border: `2px solid ${isCustomTime ? accent : "#1a1a28"}`,
                      backgroundColor: isCustomTime ? `${accent}15` : "#0c0c18",
                      color: isCustomTime ? accent : "#6b7280",
                      fontSize: 14, fontWeight: 800, textAlign: "center",
                      outline: "none"
                    }}
                  />
                </div>
              </div>

              <button onClick={startWork} style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${accent}, ${accentDark})`, color: "#fff", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>Έναρξη Εργασίας</button>
              <button onClick={() => setScreen("exercises")} style={{ width: "100%", marginTop: 12, padding: "12px", borderRadius: 10, backgroundColor: "#0c0c18", border: "1px solid #14141f", color: "#6b7280", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>📖 Προβολή Ασκήσεων</button>
            </div>
          )}

          {/* WORKING SCREEN */}
          {screen === "working" && (
            <div style={{ padding: "32px 24px", textAlign: "center" }}>
              <div style={{ fontSize: 14, color: "#6b7280", marginBottom: 24 }}>Μείνετε συγκεντρωμένοι...</div>
              <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}>
                <TimerRing progress={1 - (timeLeft / (workMinutes * 60))} timeLeft={timeLeft} totalTime={workMinutes * 60} isRunning={isRunning} color={accent} size={220} />
              </div>
              <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                <button onClick={() => setIsRunning(!isRunning)} style={{ width: 56, height: 56, borderRadius: 16, backgroundColor: `${accent}15`, color: accent, fontSize: 20, border: "none", cursor: "pointer" }}>{isRunning ? "⏸" : "▶"}</button>
                <button onClick={() => { setScreen("home"); setIsRunning(false); }} style={{ width: 56, height: 56, borderRadius: 16, backgroundColor: "#0c0c18", color: "#4b5563", border: "1px solid #1a1a28", cursor: "pointer" }}>✕</button>
              </div>
            </div>
          )}

          {/* BREAK SCREEN */}
          {screen === "break" && (
            <div style={{ padding: "24px" }}>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <h2 style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", margin: "0 0 4px" }}>Ώρα για Διάλειμμα!</h2>
                <p style={{ fontSize: 12, color: "#6b7280", margin: 0 }}>Κάντε τις παρακάτω ασκήσεις</p>
              </div>

              {EXERCISES.slice(0, 3).map((ex) => {
                const isActive = currentExercise && currentExercise.id === ex.id;
                const isDone = completedToday.includes(ex.id);
                return (
                  <div key={ex.id} style={{ padding: 16, borderRadius: 14, marginBottom: 12, backgroundColor: isActive ? `${accent}10` : "#0c0c18", border: `1px solid ${isActive ? accent + "40" : isDone ? "#3b82f630" : "#14141f"}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: "#e2e8f0" }}>{ex.name}</div>
                      <span style={{ fontSize: 10, fontWeight: 800, padding: "2px 6px", borderRadius: 4, backgroundColor: "#141420", color: "#9ca3af" }}>{ex.reps}</span>
                    </div>
                    
                    <img src={ex.image} alt={ex.name} style={{ width: "100%", height: "200px", objectFit: "contain", borderRadius: "8px", marginBottom: "10px", border: `1px solid ${accent}40`, background: "#141420", padding: "8px", boxSizing: "border-box" }} />
                    <div style={{ fontSize: 12, color: "#9ca3af", lineHeight: 1.5, marginBottom: "10px" }}>{ex.instruction}</div>
                    
                    {isActive && exerciseRunning ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ flex: 1, height: 6, backgroundColor: "#141420", borderRadius: 3, overflow: "hidden" }}>
                          <div style={{ width: `${((ex.duration - exerciseTimeLeft) / ex.duration) * 100}%`, height: "100%", backgroundColor: accent, borderRadius: 3, transition: "width 1s linear" }} />
                        </div>
                        <span style={{ fontSize: 14, fontWeight: 800, color: accent, minWidth: 28 }}>{exerciseTimeLeft}s</span>
                      </div>
                    ) : isActive && !exerciseRunning && exerciseTimeLeft <= 0 ? (
                      <div style={{ fontSize: 11, color: accent, fontWeight: 600 }}>✓ Ολοκληρώθηκε!</div>
                    ) : (
                      <button onClick={() => startExercise(ex)} disabled={isDone} style={{ padding: "8px 14px", borderRadius: 8, border: "none", backgroundColor: isDone ? "#1a1a28" : `${accent}18`, color: isDone ? "#374151" : accent, fontSize: 12, fontWeight: 700, cursor: isDone ? "default" : "pointer" }}>
                        {isDone ? "Ολοκληρώθηκε ✓" : "▶ Έναρξη άσκησης"}
                      </button>
                    )}
                  </div>
                );
              })}
              <button onClick={finishBreak} style={{ width: "100%", padding: "14px", borderRadius: 12, border: "none", background: completedToday.length >= 1 ? `linear-gradient(135deg, ${accent}, ${accentDark})` : "#1a1a28", color: completedToday.length >= 1 ? "#fff" : "#6b7280", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 6 }}>
                Επιστροφή στην Εργασία
              </button>
            </div>
          )}

          {/* EXERCISE LIBRARY SCREEN WITH FILTERS */}
          {screen === "exercises" && (
            <div style={{ padding: "20px" }}>
              <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: accent, cursor: "pointer", fontSize: 12, padding: 0, marginBottom: 12 }}>← Πίσω</button>
              <h2 style={{ fontSize: 20, fontWeight: 800, color: "#f1f5f9", margin: "0 0 16px" }}>Ασκήσεις</h2>
              
              {/* BODY AREA FILTERS */}
              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 12, marginBottom: 12, scrollbarWidth: "none" }}>
                {Object.entries(AREA_LABELS).map(([key, label]) => (
                  <button key={key} onClick={() => setActiveFilter(key)} style={{
                    padding: "6px 12px", borderRadius: 20, fontSize: 11, fontWeight: 600, whiteSpace: "nowrap", border: "none", cursor: "pointer",
                    backgroundColor: activeFilter === key ? accent : "#141420", color: activeFilter === key ? "#fff" : "#6b7280"
                  }}>{label}</button>
                ))}
              </div>
              
              {displayedExercises.map((ex) => (
                <div key={ex.id} style={{ padding: 14, borderRadius: 12, marginBottom: 12, backgroundColor: "#0c0c18", border: "1px solid #14141f" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#e2e8f0" }}>{ex.name}</div>
                    <span style={{ fontSize: 10, fontWeight: 800, padding: "2px 6px", borderRadius: 4, backgroundColor: "#141420", color: "#9ca3af" }}>{ex.reps}</span>
                  </div>
                  
                  <img src={ex.image} alt={ex.name} style={{ width: "100%", height: "200px", objectFit: "contain", borderRadius: "8px", marginBottom: "10px", border: `1px solid ${accent}40`, background: "#141420", padding: "8px", boxSizing: "border-box" }} />
                  <div style={{ fontSize: 12, color: "#9ca3af", lineHeight: 1.5, marginBottom: 8 }}>{ex.instruction}</div>
                  <div style={{ fontSize: 10, color: "#6b7280" }}>{ex.evidence}</div>
                </div>
              ))}
            </div>
          )}

          {/* BOTTOM NAV */}
          {(screen === "home" || screen === "exercises") && (
            <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, padding: "12px", background: "#08080f", borderTop: "1px solid #14141f", display: "flex", justifyContent: "center", gap: 12 }}>
              <button onClick={() => setScreen("home")} style={{ padding: "8px 20px", borderRadius: 10, border: "none", backgroundColor: screen === "home" ? `${accent}15` : "transparent", color: screen === "home" ? accent : "#4b5563", fontWeight: 600, cursor: "pointer" }}>🏠 Αρχική</button>
              <button onClick={() => setScreen("exercises")} style={{ padding: "8px 20px", borderRadius: 10, border: "none", backgroundColor: screen === "exercises" ? `${accent}15` : "transparent", color: screen === "exercises" ? accent : "#4b5563", fontWeight: 600, cursor: "pointer" }}>📖 Ασκήσεις</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BreakFlow />);
  </script>
</body>
</html>
