<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreakO-Clock</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #08080f; -webkit-tap-highlight-color: transparent;">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useCallback } = React;

    // ─── LOCAL STORAGE HOOK ───
    function useStickyState(defaultValue, key) {
      const [value, setValue] = useState(() => {
        try {
          const stickyValue = window.localStorage.getItem(key);
          return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
        } catch (e) {
          return defaultValue;
        }
      });
      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {}
      }, [key, value]);
      return [value, setValue];
    }

    // ─── EXERCISE LIBRARY ───
    const EXERCISES = [
      // NECK EXERCISES
      { 
        id: "chin-tuck", 
        name: "Οπίσθια Προβολή Αυχένα", 
        reps: "5-10 επαν.", 
        bodyArea: "neck", 
        instruction: "Τραβήξτε αργά το κεφάλι σας προς τα πίσω και ελαφρώς προς τα κάτω. Θα νιώσετε ήπια ένταση στον αυχένα.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά.", 
        image: "./opisthia-provoli-auxena-chin-tuck.png" 
      },
      { 
        id: "neck-ext", 
        name: "Έκταση Αυχένα", 
        reps: "5-10 επαν.", 
        bodyArea: "neck", 
        instruction: "Κλίνετε αργά το κεφάλι προς τα πίσω μέχρι να νιώσετε πίεση στο πίσω μέρος του αυχένα. Σταματήστε αμέσως αν νιώσετε ζάλη.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά.", 
        image: "./askisi-ektasi-auxena.png" 
      },
      { 
        id: "neck-side", 
        name: "Πλάγια κάμψη Αυχένα", 
        reps: "5-10 επαν.", 
        bodyArea: "neck", 
        instruction: "Κρατώντας τη μύτη σας στραμμένη μπροστά, φέρτε αργά το αριστερό σας αυτί προς τον αριστερό ώμο. Επαναλάβετε προς τα δεξιά.", 
        evidence: "Και στις δύο πλευρές. Εκτελέστε 5 φορές καθημερινά.", 
        image: "./plagia-kampsi-auxena.png" 
      },
      { 
        id: "shoulder-circles", 
        name: "Κυκλικές Κινήσεις Ώμων", 
        reps: "10-15 επαν.", 
        bodyArea: "neck", 
        instruction: "Κάντε αργούς, μεγάλους κύκλους με τους ώμους. Κάθε φορά που οι ώμοι πάνε προς τα πίσω και κάτω, πλησιάστε τις ωμοπλάτες μεταξύ τους.", 
        evidence: "Χαλαρώνει την ένταση της ωμικής ζώνης.", 
        image: "./kiklikes-kiniseis-wmwn.png" 
      },
      { 
        id: "scapula-stretch", 
        name: "Διάταση Ανελκτήρα", 
        reps: "2-3 επαν. x 30s", 
        bodyArea: "neck", 
        instruction: "Πιάστε την άκρη της καρέκλας. Γυρίστε το κεφάλι διαγώνια, σαν να κοιτάτε τη μασχάλη της άλλης πλευράς. Πιέστε απαλά το κεφάλι με το ελεύθερο χέρι.", 
        evidence: "Κρατήστε την διάταση για 30-60 δευτερόλεπτα κάθε φορά.", 
        image: "./diatasi-aneltira-wmoplatis.png" 
      },
      // BACK / TRUNK EXERCISES
      { 
        id: "pelvic-tilt", 
        name: "Πυελική κλίση (καθιστή θέση)", 
        reps: "10-15 επαν.", 
        bodyArea: "back", 
        instruction: "Καθίστε στην καρέκλα. Τραβήξτε απαλά τον αφαλό προς τα μέσα και γείρετε αργά τη λεκάνη προς τα εμπρός. Μείνετε για 2-3 δευτ. και μετά γείρετε προς τα πίσω.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά.", 
        image: "./Pelvic-tilt.png" 
      },
      { 
        id: "trunk-rotation", 
        name: "Στροφή σώματος", 
        reps: "5-10 επαν.", 
        bodyArea: "back", 
        instruction: "Σταυρώστε τα χέρια σας πάνω από το στήθος. Στρίψτε τη σπονδυλική σας στήλη προς τη μία πλευρά όσο το επιτρέπει η άνεσή σας. Επιστρέψτε και επαναλάβετε.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά και προς τις δύο πλευρές.", 
        image: "./Trunk-rotation.png" 
      },
      { 
        id: "side-bending", 
        name: "Πλάγια κάμψη οσφύος", 
        reps: "5-10 επαν.", 
        bodyArea: "back", 
        instruction: "Σταθείτε όρθιοι. Το ένα χέρι τοποθετείται στη μέση, ενώ το άλλο ανεβαίνει πάνω από το κεφάλι και τεντώνεται προς την αντίθετη κατεύθυνση.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά και προς τις δύο πλευρές.", 
        image: "./Side-bending-trunk.png" 
      },
      { 
        id: "trunk-ext", 
        name: "Έκταση σπονδυλικής στήλης", 
        reps: "5-10 επαν.", 
        bodyArea: "back", 
        instruction: "Σταθείτε όρθιοι και εκτείνετε τη σπονδυλική σας στήλη κάνοντας μια μικρή καμπύλη προς τα πίσω. Τα χέρια στη μέση για στήριξη.", 
        evidence: "Εκτελέστε 5 φορές καθημερινά.", 
        image: "./Trunk-extension.png" 
      }
    ];

    const AREA_LABELS = { all: "Όλες", neck: "Αυχένας", back: "Μέση" };

    // ─── TIMER RING ───
    function TimerRing({ progress, timeLeft, totalTime, isRunning, color, size = 200, ringBg = "#141420", textColor = "#f1f5f9" }) {
      const radius = (size - 16) / 2;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - progress);
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      return (
        <div style={{ position: "relative", width: size, height: size, margin: "0 auto" }}>
          <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={ringBg} strokeWidth="6" />
            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset} style={{ transition: "stroke-dashoffset 1s linear", filter: `drop-shadow(0 0 8px ${color}40)` }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontSize: size > 150 ? 42 : 28, fontWeight: 800, color: textColor, fontFamily: "monospace", letterSpacing: -2 }}>
              {minutes}:{seconds.toString().padStart(2, "0")}
            </div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ───
    function BreakFlow() {
      const [screen, setScreen] = useState("home"); 
      
      // Theme State
      const [darkMode, setDarkMode] = useStickyState(true, "bf-theme-v2");
      
      // Setup State
      const [workMinutes, setWorkMinutes] = useState(30);
      const [hasPain, setHasPain] = useState(null); 
      const [painLocation, setPainLocation] = useState(null); 

      // Timer State
      const [timeLeft, setTimeLeft] = useState(30 * 60);
      const [isRunning, setIsRunning] = useState(false);
      
      // Break State
      const [activeBreakExercises, setActiveBreakExercises] = useState([]);
      const [activeFilter, setActiveFilter] = useState("all");

      // Break duration timer
      const [breakStartTime, setBreakStartTime] = useState(null);
      const [breakElapsed, setBreakElapsed] = useState(0);
      const [breakReminder, setBreakReminder] = useState(false);

      const todayDateString = new Date().toDateString();
      const [savedDate, setSavedDate] = useStickyState(todayDateString, "bf-date-v2");
      const [completedToday, setCompletedToday] = useStickyState([], "bf-completed-v2");
      const [totalBreaksToday, setTotalBreaksToday] = useStickyState(0, "bf-breaks-v2");

      useEffect(() => {
        if (savedDate !== todayDateString) {
          setCompletedToday([]); setTotalBreaksToday(0); setSavedDate(todayDateString);
        }
      }, [todayDateString, savedDate]);

      // Sound - robust multi-tone chime
      const playChime = useCallback(() => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          
          // First tone
          const osc1 = ctx.createOscillator();
          const gain1 = ctx.createGain();
          osc1.connect(gain1); gain1.connect(ctx.destination);
          osc1.type = "sine";
          osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
          gain1.gain.setValueAtTime(0, ctx.currentTime);
          gain1.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.05);
          gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
          osc1.start(ctx.currentTime); osc1.stop(ctx.currentTime + 0.8);

          // Second tone (higher, delayed)
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.connect(gain2); gain2.connect(ctx.destination);
          osc2.type = "sine";
          osc2.frequency.setValueAtTime(659.25, ctx.currentTime + 0.3); // E5
          gain2.gain.setValueAtTime(0, ctx.currentTime);
          gain2.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.35);
          gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
          osc2.start(ctx.currentTime + 0.3); osc2.stop(ctx.currentTime + 1.2);

          // Third tone (highest, more delayed)
          const osc3 = ctx.createOscillator();
          const gain3 = ctx.createGain();
          osc3.connect(gain3); gain3.connect(ctx.destination);
          osc3.type = "sine";
          osc3.frequency.setValueAtTime(783.99, ctx.currentTime + 0.6); // G5
          gain3.gain.setValueAtTime(0, ctx.currentTime);
          gain3.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.65);
          gain3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.8);
          osc3.start(ctx.currentTime + 0.6); osc3.stop(ctx.currentTime + 1.8);
        } catch (e) {
            console.log("Audio not supported or blocked");
        }
      }, []);

      // Desktop Notification Function
      const triggerNotification = useCallback((title, body) => {
        try {
          if (Notification.permission === 'granted') {
            new Notification(title || 'Ώρα για Διάλειμμα!', {
              body: body || 'Ο χρόνος εργασίας τελείωσε. Κάντε τις ασκήσεις σας.',
              icon: './logo-WP-Social-OnlyIcon.jpg'
            });
          }
        } catch(e) {}
      }, []);

      // Work Timer Logic
      useEffect(() => {
        if (!isRunning || screen !== "working") return;
        if (timeLeft <= 0) {
          playChime(); 
          triggerNotification();
          
          let chosenExercises = [];
          if (hasPain && painLocation === 'neck') {
            chosenExercises = EXERCISES.filter(ex => ex.bodyArea === 'neck');
          } else if (hasPain && painLocation === 'back') {
            chosenExercises = EXERCISES.filter(ex => ex.bodyArea === 'back');
          } else {
            chosenExercises = [...EXERCISES].sort(() => 0.5 - Math.random()).slice(0, 5);
          }
          setActiveBreakExercises(chosenExercises);
          setBreakStartTime(Date.now());
          setBreakElapsed(0);
          setBreakReminder(false);
          setScreen("break"); 
          setIsRunning(false);
          return;
        }
        const t = setTimeout(() => setTimeLeft(tl => tl - 1), 1000);
        return () => clearTimeout(t);
      }, [isRunning, timeLeft, screen, hasPain, painLocation]);

      // Break duration timer
      useEffect(() => {
        if (screen !== "break" || !breakStartTime) return;
        const t = setInterval(() => {
          const elapsed = Math.floor((Date.now() - breakStartTime) / 1000);
          setBreakElapsed(elapsed);
          // 5 minute reminder
          if (elapsed >= 300 && !breakReminder) {
            setBreakReminder(true);
            playChime();
            triggerNotification('Υπενθύμιση Διαλείμματος', 'Πέρασαν 5 λεπτά. Ώρα να επιστρέψετε στην εργασία!');
          }
        }, 1000);
        return () => clearInterval(t);
      }, [screen, breakStartTime, breakReminder]);

      const startWork = () => { 
        if (typeof Notification !== "undefined" && Notification.permission !== "granted" && Notification.permission !== "denied") {
          Notification.requestPermission();
        }
        setTimeLeft(workMinutes * 60); 
        setIsRunning(true); 
        setScreen("working"); 
      };

      const finishBreak = () => { 
        setTotalBreaksToday(b => b + 1);
        setBreakStartTime(null);
        setBreakElapsed(0);
        setBreakReminder(false);
        startWork(); 
      };

      const markExerciseDone = (id) => {
        if (!completedToday.includes(id)) {
          setCompletedToday(prev => [...prev, id]);
        }
      };

      const skipExercise = (id) => {
        setActiveBreakExercises(prev => {
          const updated = prev.filter(ex => ex.id !== id);
          // Pick a replacement from exercises not already in the break list
          const currentIds = updated.map(ex => ex.id);
          const available = EXERCISES.filter(ex => !currentIds.includes(ex.id) && ex.id !== id);
          if (available.length > 0) {
            const replacement = available[Math.floor(Math.random() * available.length)];
            updated.push(replacement);
          }
          return updated;
        });
      };

      const formatBreakTime = (secs) => {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        return `${m}:${s.toString().padStart(2, "0")}`;
      };

      const displayedLibraryExercises = activeFilter === "all" ? EXERCISES : EXERCISES.filter(ex => ex.bodyArea === activeFilter);
      const accent = "#3b82f6";
      const accentDark = "#1d4ed8";
      const isCustomTime = ![20, 30, 45, 60].includes(workMinutes);

      // Theme colors
      const T = darkMode ? {
        bg: "#08080f",
        cardBg: "#0c0c18",
        cardBorder: "#1a1a28",
        cardBgAlt: "#0a0a14",
        inputBg: "#141420",
        text: "#c9d1d9",
        textBright: "#f1f5f9",
        textMuted: "#9ca3af",
        textDim: "#6b7280",
        textFaint: "#4b5563",
        ring: "#141420",
        navBg: "#08080f",
        imageBg: "#141420",
        doneBg: "#22c55e10",
      } : {
        bg: "#f0f2f5",
        cardBg: "#ffffff",
        cardBorder: "#d1d5db",
        cardBgAlt: "#f9fafb",
        inputBg: "#e5e7eb",
        text: "#374151",
        textBright: "#111827",
        textMuted: "#4b5563",
        textDim: "#6b7280",
        textFaint: "#9ca3af",
        ring: "#e5e7eb",
        navBg: "#f0f2f5",
        imageBg: "#e5e7eb",
        doneBg: "#22c55e18",
      };

      // Apply body background
      useEffect(() => {
        document.body.style.background = T.bg;
      }, [darkMode]);

      return (
        <div className="app-container" style={{ color: T.text }}>
          <style>{` 
            button { font-family: inherit; } 
            input[type=number]::-webkit-inner-spin-button, 
            input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
            @keyframes pulseReminder {
              0%, 100% { opacity: 1; }
              50% { opacity: 0.6; }
            }
            
            /* Mobile First Styles */
            .app-container {
              min-height: 100vh;
              color: #c9d1d9;
              font-family: sans-serif;
              max-width: 480px;
              margin: 0 auto;
              padding-bottom: 80px;
              position: relative;
              font-size: 15px;
            }
            .bottom-nav {
              position: fixed;
              bottom: 0;
              left: 50%;
              transform: translateX(-50%);
              width: 100%;
              max-width: 480px;
              padding: 12px;
              display: flex;
              justify-content: center;
              gap: 12px;
              z-index: 10;
            }
            .exercise-image {
              width: 100%;
              height: 220px;
              object-fit: contain;
              border-radius: 8px;
              margin-bottom: 10px;
              background: #141420;
              padding: 8px;
              box-sizing: border-box;
            }
            .pain-icon {
              width: 80px;
              height: 80px;
              border-radius: 10px;
              object-fit: cover;
              background-color: #fff;
            }
            .pain-card {
              flex: 1;
              padding: 18px;
              border-radius: 14px;
              font-size: 15px;
              font-weight: 700;
              cursor: pointer;
              display: flex;
              flex-direction: column;
              align-items: center;
              gap: 12px;
              transition: all 0.2s;
            }

            /* Desktop / Wide Screen Overrides */
            @media (min-width: 768px) {
              .app-container {
                max-width: 700px;
                font-size: 16px;
              }
              .bottom-nav {
                max-width: 700px; 
              }
              .exercise-image {
                height: 400px; 
              }
              .pain-icon {
                width: 120px;
                height: 120px;
                border-radius: 14px;
              }
              .pain-card {
                padding: 24px;
                border-radius: 16px;
                font-size: 17px;
                gap: 14px;
              }
            }
          `}</style>

          {/* ═══ HOME SCREEN (SETUP) ═══ */}
          {screen === "home" && (
            <div style={{ padding: "40px 24px" }}>
              {/* Theme toggle */}
              <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
                <button onClick={() => setDarkMode(!darkMode)} style={{
                  width: 44, height: 44, borderRadius: 12, border: `1px solid ${T.cardBorder}`,
                  backgroundColor: T.cardBg, color: T.textDim,
                  fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all 0.3s",
                }} title={darkMode ? "Φωτεινό θέμα" : "Σκοτεινό θέμα"}>
                  {darkMode ? "☀️" : "🌙"}
                </button>
              </div>

              <div style={{ textAlign: "center", marginBottom: 32 }}>
                <img src="./logo-WP-Social-OnlyIcon.jpg" alt="Workplace Physiocare Logo" style={{ width: 80, height: 80, borderRadius: 20, margin: "0 auto 12px", display: "block", boxShadow: `0 8px 32px ${accent}40`, objectFit: "cover" }} />
                <h1 style={{ fontSize: 28, fontWeight: 800, color: T.textBright, margin: "0 0 4px" }}>Workplace Physiocare</h1>
                <p style={{ fontSize: 14, color: T.textMuted, margin: 0, fontStyle: "italic" }}>Your Health Partner at Work</p>
              </div>

              {/* Q1: TIMER SELECTOR */}
              <div style={{ marginBottom: 24, padding: "16px", backgroundColor: T.cardBg, borderRadius: "16px", border: `1px solid ${T.cardBorder}` }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: T.textBright, marginBottom: 12, textAlign: "center" }}>Κάθε πόσα λεπτά θέλετε να κάνετε διάλειμμα;</div>
                <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
                  {[20, 30, 45, 60].map(min => (
                    <button key={min} onClick={() => setWorkMinutes(min)} style={{
                      width: 52, height: 52, borderRadius: 12, border: `2px solid ${workMinutes === min ? accent : T.cardBorder}`,
                      backgroundColor: workMinutes === min ? `${accent}15` : T.inputBg,
                      color: workMinutes === min ? accent : T.textMuted,
                      fontSize: 16, fontWeight: 800, cursor: "pointer", transition: "all 0.2s"
                    }}>{min}</button>
                  ))}
                  <input 
                    type="number" 
                    placeholder="Άλλο"
                    onChange={(e) => {
                      const val = parseInt(e.target.value);
                      if(val > 0) setWorkMinutes(val);
                    }}
                    style={{
                      width: 60, height: 52, borderRadius: 12, 
                      border: `2px solid ${isCustomTime ? accent : T.cardBorder}`,
                      backgroundColor: isCustomTime ? `${accent}15` : T.inputBg,
                      color: isCustomTime ? accent : T.textMuted,
                      fontSize: 14, fontWeight: 800, textAlign: "center", outline: "none"
                    }}
                  />
                </div>
              </div>

              {/* Q2: PAIN PRESENCE */}
              <div style={{ marginBottom: 24, padding: "16px", backgroundColor: T.cardBg, borderRadius: "16px", border: `1px solid ${T.cardBorder}` }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: T.textBright, marginBottom: 12, textAlign: "center" }}>Αισθάνεστε κάποιον πόνο;</div>
                <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                  <button onClick={() => setHasPain(true)} style={{ flex: 1, padding: "12px", borderRadius: 12, border: `2px solid ${hasPain === true ? accent : T.cardBorder}`, backgroundColor: hasPain === true ? `${accent}15` : T.inputBg, color: hasPain === true ? accent : T.textMuted, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Ναι</button>
                  <button onClick={() => { setHasPain(false); setPainLocation(null); }} style={{ flex: 1, padding: "12px", borderRadius: 12, border: `2px solid ${hasPain === false ? accent : T.cardBorder}`, backgroundColor: hasPain === false ? `${accent}15` : T.inputBg, color: hasPain === false ? accent : T.textMuted, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Όχι</button>
                </div>

                {/* Q3: PAIN LOCATION */}
                {hasPain && (
                  <div style={{ marginTop: 16, paddingTop: 16, borderTop: `1px solid ${T.cardBorder}` }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: T.textBright, marginBottom: 16, textAlign: "center" }}>Πού εντοπίζεται ο πόνος;</div>
                    <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                      
                      {/* Neck Selection Card */}
                      <button className="pain-card" onClick={() => setPainLocation('neck')} style={{ 
                        border: `2px solid ${painLocation === 'neck' ? accent : T.cardBorder}`, 
                        backgroundColor: painLocation === 'neck' ? `${accent}15` : T.inputBg, 
                        color: painLocation === 'neck' ? accent : T.textMuted, 
                      }}>
                        <img className="pain-icon" src="./officeFemale.png" alt="Πόνος στον Αυχένα" />
                        <span>Αυχένας</span>
                      </button>

                      {/* Back Selection Card */}
                      <button className="pain-card" onClick={() => setPainLocation('back')} style={{ 
                        border: `2px solid ${painLocation === 'back' ? accent : T.cardBorder}`, 
                        backgroundColor: painLocation === 'back' ? `${accent}15` : T.inputBg, 
                        color: painLocation === 'back' ? accent : T.textMuted, 
                      }}>
                        <img className="pain-icon" src="./officeMale.png" alt="Πόνος στη Μέση" />
                        <span>Μέση</span>
                      </button>
                      
                    </div>
                  </div>
                )}
              </div>

              <button 
                onClick={startWork} 
                disabled={hasPain && painLocation === null}
                style={{ width: "100%", padding: "16px", borderRadius: 14, border: "none", background: (hasPain && painLocation === null) ? T.inputBg : `linear-gradient(135deg, ${accent}, ${accentDark})`, color: (hasPain && painLocation === null) ? T.textFaint : "#fff", fontSize: 16, fontWeight: 800, cursor: (hasPain && painLocation === null) ? "not-allowed" : "pointer", opacity: (hasPain && painLocation === null) ? 0.7 : 1 }}
              >
                Έναρξη Εργασίας
              </button>

              {/* ─── DISCLAIMER ─── */}
              <div style={{ marginTop: 24, padding: "12px 14px", borderRadius: 10, backgroundColor: T.cardBg, border: `1px solid ${T.cardBorder}` }}>
                <div style={{ fontSize: 11, color: T.textFaint, lineHeight: 1.7, textAlign: "center" }}>
                  <span style={{ color: T.textDim, fontWeight: 600 }}>⚕️ Σημαντική Σημείωση:</span> Οι ασκήσεις αυτές είναι γενικής φύσεως και δεν αντικαθιστούν εξατομικευμένη ιατρική ή φυσιοθεραπευτική συμβουλή. Σταματήστε αμέσως αν νιώσετε έντονο πόνο, ζάλη ή μούδιασμα και συμβουλευτείτε τον γιατρό ή φυσιοθεραπευτή σας. Η χρήση της εφαρμογής γίνεται με δική σας ευθύνη.
                </div>
              </div>
            </div>
          )}

          {/* ═══ WORKING SCREEN ═══ */}
          {screen === "working" && (
            <div style={{ padding: "32px 24px", textAlign: "center" }}>
              <div style={{ fontSize: 15, color: T.textDim, marginBottom: 24 }}>Μπορείτε να ελαχιστοποιήσετε το παράθυρο. Θα σας ειδοποιήσουμε.</div>
              <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}>
                <TimerRing progress={1 - (timeLeft / (workMinutes * 60))} timeLeft={timeLeft} totalTime={workMinutes * 60} isRunning={isRunning} color={accent} size={220} ringBg={T.ring} textColor={T.textBright} />
              </div>
              <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                <button onClick={() => setIsRunning(!isRunning)} style={{ width: 56, height: 56, borderRadius: 16, backgroundColor: `${accent}15`, color: accent, fontSize: 20, border: "none", cursor: "pointer" }}>{isRunning ? "⏸" : "▶"}</button>
                <button onClick={() => { setScreen("home"); setIsRunning(false); }} style={{ width: 56, height: 56, borderRadius: 16, backgroundColor: T.cardBg, color: T.textFaint, border: `1px solid ${T.cardBorder}`, cursor: "pointer" }}>✕</button>
              </div>
            </div>
          )}

          {/* ═══ BREAK SCREEN ═══ */}
          {screen === "break" && (
            <div style={{ padding: "24px" }}>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <h2 style={{ fontSize: 26, fontWeight: 800, color: accent, margin: "0 0 4px" }}>Ώρα για Διάλειμμα!</h2>
                <p style={{ fontSize: 14, color: T.textMuted, margin: "0 0 12px" }}>Κάντε τις παρακάτω ασκήσεις με τον δικό σας ρυθμό.</p>
                
                {/* Break duration timer */}
                <div style={{ 
                  display: "inline-flex", alignItems: "center", gap: 8,
                  padding: "8px 16px", borderRadius: 20, 
                  backgroundColor: breakReminder ? "#f59e0b15" : T.inputBg,
                  border: `1px solid ${breakReminder ? "#f59e0b40" : T.cardBorder}`,
                  animation: breakReminder ? "pulseReminder 1.5s ease-in-out infinite" : "none",
                  transition: "all 0.3s"
                }}>
                  <span style={{ fontSize: 14 }}>{breakReminder ? "⚠️" : "⏱️"}</span>
                  <span style={{ 
                    fontSize: 16, fontWeight: 800, fontFamily: "monospace",
                    color: breakReminder ? "#f59e0b" : T.textMuted
                  }}>
                    {formatBreakTime(breakElapsed)}
                  </span>
                  {breakReminder && (
                    <span style={{ fontSize: 11, color: "#f59e0b", fontWeight: 600 }}>
                      Ώρα για επιστροφή!
                    </span>
                  )}
                </div>
              </div>

              {activeBreakExercises.map((ex) => {
                const isDone = completedToday.includes(ex.id);
                return (
                  <div key={ex.id} style={{ padding: 16, borderRadius: 14, marginBottom: 12, backgroundColor: isDone ? T.cardBgAlt : T.cardBg, border: `1px solid ${isDone ? "#22c55e40" : T.cardBorder}`, transition: "all 0.3s" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                      <div style={{ fontSize: 17, fontWeight: 800, color: isDone ? T.textDim : T.textBright }}>{ex.name}</div>
                      <span style={{ fontSize: 11, fontWeight: 800, padding: "3px 8px", borderRadius: 4, backgroundColor: T.inputBg, color: T.textMuted }}>{ex.reps}</span>
                    </div>
                    
                    <img className="exercise-image" src={ex.image} alt={ex.name} style={{ border: `1px solid ${isDone ? T.cardBorder : accent + "40"}`, opacity: isDone ? 0.5 : 1, backgroundColor: T.imageBg }} />
                    <div style={{ fontSize: 14, color: isDone ? T.textFaint : T.textMuted, lineHeight: 1.6, marginBottom: "12px" }}>{ex.instruction}</div>
                    
                    {isDone ? (
                      <div style={{ fontSize: 13, color: "#22c55e", fontWeight: 700, textAlign: "center", padding: "8px", backgroundColor: T.doneBg, borderRadius: "8px" }}>✓ Ολοκληρώθηκε</div>
                    ) : (
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => markExerciseDone(ex.id)} style={{ flex: 1, padding: "10px", borderRadius: 8, border: "none", backgroundColor: `${accent}20`, color: accent, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                          ✓ Ολοκλήρωση
                        </button>
                        <button onClick={() => skipExercise(ex.id)} style={{ padding: "10px 14px", borderRadius: 8, border: `1px solid ${T.cardBorder}`, backgroundColor: T.inputBg, color: T.textDim, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                          Παράλειψη ↷
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
              <button onClick={finishBreak} style={{ width: "100%", padding: "16px", borderRadius: 12, border: "none", background: `linear-gradient(135deg, ${accent}, ${accentDark})`, color: "#fff", fontSize: 16, fontWeight: 800, cursor: "pointer", marginTop: 12, boxShadow: `0 4px 20px ${accent}40` }}>
                Επιστροφή στην Εργασία
              </button>
            </div>
          )}

          {/* ═══ EXERCISE LIBRARY SCREEN ═══ */}
          {screen === "exercises" && (
            <div style={{ padding: "20px", paddingBottom: "100px" }}>
              <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
                <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: accent, cursor: "pointer", fontSize: 20, padding: 0, marginRight: 12 }}>←</button>
                <h2 style={{ fontSize: 20, fontWeight: 800, color: T.textBright, margin: 0 }}>Βιβλιοθήκη Ασκήσεων</h2>
              </div>
              
              {/* BODY AREA FILTERS */}
              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 12, marginBottom: 12, scrollbarWidth: "none" }}>
                {Object.entries(AREA_LABELS).map(([key, label]) => (
                  <button key={key} onClick={() => setActiveFilter(key)} style={{
                    padding: "8px 16px", borderRadius: 20, fontSize: 12, fontWeight: 700, whiteSpace: "nowrap", border: "none", cursor: "pointer",
                    backgroundColor: activeFilter === key ? accent : T.inputBg, color: activeFilter === key ? "#fff" : T.textMuted
                  }}>{label}</button>
                ))}
              </div>
              
              {displayedLibraryExercises.map((ex) => (
                <div key={ex.id} style={{ padding: 14, borderRadius: 12, marginBottom: 16, backgroundColor: T.cardBg, border: `1px solid ${T.cardBorder}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div style={{ fontSize: 17, fontWeight: 800, color: T.textBright }}>{ex.name}</div>
                    <span style={{ fontSize: 12, fontWeight: 800, padding: "4px 8px", borderRadius: 6, backgroundColor: T.inputBg, color: T.textMuted }}>{ex.reps}</span>
                  </div>
                  
                  <img className="exercise-image" src={ex.image} alt={ex.name} style={{ border: `1px solid ${accent}40`, backgroundColor: T.imageBg }} />
                  <div style={{ fontSize: 14, color: T.textMuted, lineHeight: 1.6, marginBottom: 8 }}>{ex.instruction}</div>
                  <div style={{ fontSize: 12, color: T.textDim, fontStyle: "italic" }}>{ex.evidence}</div>
                </div>
              ))}

              {/* ─── DISCLAIMER (Library screen) ─── */}
              <div style={{ marginTop: 8, padding: "12px 14px", borderRadius: 10, backgroundColor: T.cardBg, border: `1px solid ${T.cardBorder}` }}>
                <div style={{ fontSize: 11, color: T.textFaint, lineHeight: 1.7, textAlign: "center" }}>
                  <span style={{ color: T.textDim, fontWeight: 600 }}>⚕️ Σημαντική Σημείωση:</span> Οι ασκήσεις αυτές είναι γενικής φύσεως και δεν αντικαθιστούν εξατομικευμένη ιατρική ή φυσιοθεραπευτική συμβουλή. Σταματήστε αμέσως αν νιώσετε έντονο πόνο, ζάλη ή μούδιασμα.
                </div>
              </div>
            </div>
          )}

          {/* ═══ BOTTOM NAV ═══ */}
          {(screen === "home" || screen === "exercises") && (
            <div className="bottom-nav" style={{ background: T.navBg, borderTop: `1px solid ${T.cardBorder}` }}>
              <button onClick={() => setScreen("home")} style={{ padding: "10px 24px", borderRadius: 12, border: "none", backgroundColor: screen === "home" ? `${accent}15` : "transparent", color: screen === "home" ? accent : T.textFaint, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>🏠 Αρχική</button>
              <button onClick={() => setScreen("exercises")} style={{ padding: "10px 24px", borderRadius: 12, border: "none", backgroundColor: screen === "exercises" ? `${accent}15` : "transparent", color: screen === "exercises" ? accent : T.textFaint, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>📖 Ασκήσεις</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BreakFlow />);
  </script>
</body>
</html>
